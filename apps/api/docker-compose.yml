# One-shot dev infra. Run `docker compose up -d` for local Postgres + Redis.

services:
  postgres:
    image: postgres:16-alpine
    container_name: circuit-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: circuit
      POSTGRES_PASSWORD: circuit
      POSTGRES_DB: circuit_dev
    ports:
      - '5432:5432'
    volumes:
      - circuit-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U circuit -d circuit_dev']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: circuit-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - circuit-redis-data:/data
    command: ['redis-server', '--appendonly', 'yes']
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  circuit-postgres-data:
  circuit-redis-data:
