name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  mobile:
    name: Mobile
    runs-on: ubuntu-latest
    timeout-minutes: 12
    defaults:
      run:
        working-directory: apps/mobile

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: .

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

  api:
    name: API
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: circuit
          POSTGRES_PASSWORD: circuit
          POSTGRES_DB: circuit_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U circuit"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 8

    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://circuit:circuit@localhost:5432/circuit_test
      JWT_SECRET: ci_jwt_secret_at_least_32_characters_long_for_zod
      OPENAI_API_KEY: dummy_for_ci_no_calls_are_made_in_unit_tests
      OTP_PROVIDER: MOCK

    defaults:
      run:
        working-directory: apps/api

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: .

      - name: Validate Prisma schema
        run: npx prisma validate

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Apply migrations
        run: npx prisma migrate deploy

      - name: Lint
        run: npm run lint

      - name: Typecheck (src)
        run: npm run typecheck

      - name: Typecheck (tests)
        run: npm run typecheck:tests

      - name: Build
        run: npm run build

      - name: Tests
        run: npm test
