name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '22'

jobs:
  format:
    name: Format
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Prettier check
        run: npm run format:check

  mobile:
    name: Mobile
    runs-on: ubuntu-latest
    timeout-minutes: 12
    needs: format

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run mobile:typecheck

      - name: Lint
        run: npm run mobile:lint

      - name: Test
        run: npm run mobile:test

  api:
    name: API
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: format

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: circuit
          POSTGRES_PASSWORD: circuit
          POSTGRES_DB: circuit_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U circuit"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 8

    env:
      NODE_ENV: test
      APP_ENV: local
      DATABASE_URL: postgresql://circuit:circuit@localhost:5432/circuit_test
      JWT_SECRET: ci_jwt_secret_at_least_32_characters_long_for_zod
      OTP_SECRET: ci_otp_secret_at_least_32_characters_long
      LLM_PROVIDER: NVIDIA
      NVIDIA_API_KEY: nvapi_ci_dummy_no_external_calls_in_unit_tests
      NVIDIA_MODEL_PLANNER: nvidia/test-planner
      NVIDIA_MODEL_EXTRACTOR: nvidia/test-extractor
      NVIDIA_MODEL_FAST: nvidia/test-fast
      EMAIL_OTP_PROVIDER: MOCK
      PHONE_OTP_PROVIDER: MOCK
      OTP_PROVIDER: MOCK
      EXPO_PUSH_PROVIDER: MOCK

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Validate Prisma schema
        working-directory: apps/api
        run: npx prisma validate

      - name: Generate Prisma client
        run: npm run prisma:generate -w circuit-backend

      - name: Apply migrations
        working-directory: apps/api
        run: npx prisma migrate deploy

      - name: Lint
        run: npm run api:lint

      - name: Typecheck
        run: npm run api:typecheck

      - name: Typecheck tests
        run: npm run typecheck:tests -w circuit-backend

      - name: Build
        run: npm run api:build

      - name: Test
        run: npm run api:test
